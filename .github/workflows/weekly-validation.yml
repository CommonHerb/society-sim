name: weekly-validation

on:
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run weekly validation battery
        shell: pwsh
        run: ./scripts/run-weekly-validation.ps1

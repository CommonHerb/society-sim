name: determinism-gate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  determinism:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run deterministic replay gate
        shell: pwsh
        run: ./scripts/run-determinism-gate.ps1
